baseURL = "https://www.snowballassociates.com/"
languageCode = "ko"
title = "Snowball Associates"
theme = "PaperMod"
defaultContentLanguage = "ko"
paginate = 10

[build.environment]
HUGO_VERSION = "0.147.6"

[params]
  author = "ECK"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowToc = true
  ShowFullTextInRSS = true
  ShowPageViews = true
  comments = false
  DateFormat = "2006-01-02"
  hideSummary = false
  disableSpecial1stPost = false
  math = true
  disableScrollToTop = false
  mainSections = ["posts"]


  homeInfoParams = { 
    Title = "Theory in Practice", 
    Content = "뒤져라"
  }

  socialIcons = [
    { name = "github", url = "https://github.com/ECK0320" }
  ]

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
  [markup.goldmark.parser]
    attribute = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[[menu.main]]
  identifier = "identity"
  name = "I. Thoughts"
  url = "/identity/"
  weight = 1

[[menu.main]]
  identifier = "market"
  name = "II. Market Decision Log"
  url = "/market/"
  weight = 2

[[menu.main]]
  identifier = "commentary"
  name = "III. Structural Commentary"
  url = "/commentary/"
  weight = 3

[[menu.main]]
  identifier = "cognitive"
  name = "IV. Cognitive Core"
  url = "/cognitive/"
  weight = 4

[[menu.main]]
  identifier = "output"
  name = "V. Output"
  url = "/output/"
  weight = 5

[[menu.main]]
  identifier = "archive"
  name = "VI. Archive Index & Timeline"
  url = "/archive/"
  weight = 6


